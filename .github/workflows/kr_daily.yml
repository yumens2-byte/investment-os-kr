name: KR Market Daily

on:
  schedule:
    - cron: "30 20 * * 1-5"   # KST 09:33 월~금 (UTC 전날 22:33)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY RUN (발행 없이 수집/분석만)"
        type: boolean
        default: false

jobs:
  kr_daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # - name: Anti-bot random delay
      #   run: |
      #     DELAY=$((RANDOM % 500))
      #     echo "⏱️ Random delay: ${DELAY}s ($((DELAY/60))m $((DELAY%60))s)"
      #     sleep $DELAY    
          
      - name: Run KR Market Pipeline
        env:
          FRED_API_KEY:                ${{ secrets.FRED_API_KEY }}
          X_API_KEY:                   ${{ secrets.X_API_KEY }}
          X_API_SECRET:                ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:              ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:       ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_KR_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_KR_FREE_CHANNEL_ID }}
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:                ${{ secrets.SUPABASE_KEY }}
          DRY_RUN:                     ${{ inputs.dry_run || 'false' }}

      
        run: python run_market.py
